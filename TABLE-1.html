<!DOCTYPE html>
<html>
<head>
<style>
table, th, td {
        border: 1px solid rgb(34, 64, 78);
        margin: 10px;
        padding: 20px;
    }
    </style>
</head>
<body>

    <h2>Cellpacing</h2>
    <p>Change the spacing between cells with the border-spacing property:</p>

    <table style="width: 100%; border-spacing: 30px;">
        <tr>
            <th>Ovog</th>
            <th>Name</th>
            <th>Age</th>
        </tr>
        <tr>
            <td>Bat</td>
            <td>Mergen</td>
            <td>30</td>
        </tr>
        <tr>
            <td>Ylalt</td>
            <td>Sod</td>
            <td>25</td>
        </tr>
        <tr>
            <td>Ganaa</td>
            <td>Gerel</td>
            <td>28</td>
        </tr>
    </table>
</body>
</html>
