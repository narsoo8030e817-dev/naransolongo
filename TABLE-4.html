<!DOCTYPE html>
<html>
    <head>
        <style>
            table, th, td {
                border: 1px solid black;
                border-collapse: collapse;
                margin: 30px;
                padding: 30px;
            }
        </style>
    </head>
    <body>

        <h2>Cell that spans multiple columns</h2>
        <p>The colspan attribute defines the number of columns a cell should span.</p>

        <table style="width: 100;">
            <tr>
                <th>Name</th>
                <td>Jili</td>
            </tr>
            <tr>
                <th rowspan="2">Phone</th>
                <td>555-1234</td>
            </tr>
            <tr>
            <th>256-484</th>

            </tr>
        </table>
    </body>
</html>
